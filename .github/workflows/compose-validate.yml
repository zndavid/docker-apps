name: Compose Validation

on:
  pull_request:
    paths:
      - docker-compose.yml
      - .env.example
      - .github/workflows/compose-validate.yml
  push:
    branches:
      - main
    paths:
      - docker-compose.yml
      - .env.example
      - .github/workflows/compose-validate.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compose-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker-compose config
        run: docker compose -f docker-compose.yml config >/dev/null
