name: media-stack

x-common-env: &common-env
  TZ: ${TZ}
  PUID: ${PUID}
  PGID: ${PGID}

x-service-defaults: &service-defaults
  stdin_open: true
  tty: true
  restart: unless-stopped
  networks:
    - media-net

services:
  transmission-openvpn:
    <<: *service-defaults
    image: haugene/transmission-openvpn:latest
    container_name: transmission-openvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      <<: *common-env
      OPENVPN_PROVIDER: NORDVPN
      OPENVPN_USERNAME: ${NORDVPN_USER}
      OPENVPN_PASSWORD: ${NORDVPN_PASS}
      OPENVPN_CONFIG: ${OPENVPN_CONFIG_COUNTRIES}
      OPENVPN_OPTS: --inactive 3600 --ping 10 --ping-exit 60
      NORDVPN_COUNTRY: ${NORDVPN_COUNTRY}
      NORDVPN_CATEGORY: legacy_p2p
      LOCAL_NETWORK: ${LOCAL_NETWORK}
      TRANSMISSION_UTP_ENABLED: "false"
      TRANSMISSION_DOWNLOAD_DIR: /downloads/complete
      TRANSMISSION_INCOMPLETE_DIR: /downloads/incomplete
      TRANSMISSION_RPC_AUTHENTICATION_REQUIRED: "true"
      TRANSMISSION_RPC_USERNAME: ${TRANSMISSION_RPC_USER}
      TRANSMISSION_RPC_PASSWORD: ${TRANSMISSION_RPC_PASSWORD}
      TRANSMISSION_RPC_WHITELIST_ENABLED: "false"
    volumes:
      - /share/Config/transmission:/config
      - /share/Downloads:/downloads
    ports:
      - "9091:9091"

  sonarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment: *common-env
    volumes:
      - /share/Config/sonarr:/config
      - /share/Media/Series:/tv
      - /share/Downloads:/downloads
    ports:
      - "8989:8989"

  radarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment: *common-env
    volumes:
      - /share/Config/radarr:/config
      - /share/Media/Movies:/movies
      - /share/Downloads:/downloads
    ports:
      - "7878:7878"

  prowlarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment: *common-env
    volumes:
      - /share/Config/prowlarr:/config
    ports:
      - "9696:9696"

  bazarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment: *common-env
    volumes:
      - /share/Config/bazarr:/config
      - /share/Media/Movies:/movies
      - /share/Media/Series:/tv
    ports:
      - "6767:6767"

  jellyfin:
    <<: *service-defaults
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment: *common-env
    volumes:
      - /share/Config/jellyfin:/config
      - /share/Media/Series:/data/tvshows
      - /share/Media/Movies:/data/movies
    ports:
      - "8096:8096"

  jellyseerr:
    <<: *service-defaults
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      TZ: ${TZ}
    volumes:
      - /share/Config/jellyseerr:/app/config
    ports:
      - "5055:5055"

  cloudflared:
    <<: *service-defaults
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

  watchtower:
    <<: *service-defaults
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      TZ: ${TZ}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: 0 0 12 * * *
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      WATCHTOWER_NOTIFICATION_URL: telegram://${TELEGRAM_BOT_TOKEN}@telegram?chats=${TELEGRAM_CHAT_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    privileged: true
    environment:
      TZ: ${TZ}
    volumes:
      - /share/Config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

networks:
  media-net:
    driver: bridge
